<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FAQ | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;
      document.getElementById("layout").innerHTML =
        mountStudentSidebar("faq") +
        `<main class="rx-main w-100">
          <h1 class="fw-bold">Frequently Asked Questions</h1>
          <p class="text-muted">Official answers from your coordinators.</p>
          <div class="accordion mt-3" id="faq-acc"></div>
        </main>`;
      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());

      const r = await api("/api/faqs");
      const acc = document.getElementById("faq-acc");
      acc.innerHTML = (r.faqs || [])
        .map(
          (f, i) => `
        <div class="accordion-item">
          <h2 class="accordion-header" id="h${f.id}">
            <button class="accordion-button ${i ? "collapsed" : ""}" type="button" data-bs-toggle="collapse" data-bs-target="#c${f.id}">${f.question}</button>
          </h2>
          <div id="c${f.id}" class="accordion-collapse collapse ${i ? "" : "show"}" data-bs-parent="#faq-acc">
            <div class="accordion-body">${f.answer}</div>
          </div>
        </div>`
        )
        .join("");
    });
  </script>
</body>
</html>
