<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>

<body>
  <div class="rx-layout" id="layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;

      document.getElementById("layout").innerHTML =
        mountStudentSidebar("home") +
        `<main class="rx-main rx-home-main w-100">
          <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
            <div>
              <h1 class="fw-bold mb-1">Home</h1>
              <p class="text-muted mb-0">Chat with the AIML grievance assistant — register issues, ask FAQs, or check a complaint ID.</p>
            </div>
            <span class="rx-rasa-pill" id="rx-rasa-status" title="Rasa server on port 5005">Checking bot…</span>
          </div>

          <div class="rx-home-chat rx-panel-card">
            <div class="rx-home-chat-head">
              <strong>Grievance Bot</strong>
              <span class="text-muted small">Interactive · same session as your account</span>
            </div>
            <div class="rx-home-thread" id="rx-thread" aria-live="polite"></div>
            <div class="rx-home-quick" id="rx-quick">
              <button type="button" class="rx-chip" data-msg="I want to register a complaint">Register a complaint</button>
              <button type="button" class="rx-chip" data-msg="How do I check my complaint status?">Check status</button>
              <button type="button" class="rx-chip" data-msg="What categories can I use for a grievance?">Categories</button>
              <button type="button" class="rx-chip" data-msg="hello">Say hello</button>
            </div>
            <form class="rx-home-input-row" id="rx-chat-form">
              <input type="text" class="rx-home-input" id="rx-chat-input" placeholder="Type your message…" autocomplete="off" />
              <button type="submit" class="btn rx-btn-submit px-4" id="rx-chat-send">Send</button>
            </form>
          </div>

          <details class="mt-3 small text-muted">
            <summary class="cursor-pointer">Connect your trained model</summary>
            <pre class="mt-2 p-3 bg-light rounded mb-0">cd rasa_bot
rasa train
rasa run actions
rasa run --enable-api --cors "*"</pre>
            <p class="mb-0 mt-2">Point Flask to your Rasa endpoint with <code>RASA_SERVER</code>; locally that is <code>http://127.0.0.1:5005</code>.</p>
          </details>
        </main>`;

      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());

      const thread = document.getElementById("rx-thread");
      const statusEl = document.getElementById("rx-rasa-status");
      const input = document.getElementById("rx-chat-input");
      const form = document.getElementById("rx-chat-form");

      function appendBubble(role, text) {
        const wrap = document.createElement("div");
        wrap.className = "rx-bubble-wrap " + (role === "user" ? "rx-bubble-user" : "rx-bubble-bot");
        const b = document.createElement("div");
        b.className = "rx-bubble";
        b.innerHTML = escapeHtml(text).replace(/\n/g, "<br/>");
        wrap.appendChild(b);
        thread.appendChild(wrap);
        thread.scrollTop = thread.scrollHeight;
      }

      async function refreshRasaStatus() {
        try {
          const h = await api("/api/rasa/health");
          if (h.rasa_reachable) {
            statusEl.textContent = "Bot online";
            statusEl.className = "rx-rasa-pill rx-rasa-ok";
          } else {
            statusEl.textContent = "Bot offline";
            statusEl.className = "rx-rasa-pill rx-rasa-off";
          }
        } catch {
          statusEl.textContent = "Bot status unknown";
          statusEl.className = "rx-rasa-pill rx-rasa-off";
        }
      }

      appendBubble(
        "bot",
        `Hi ${user.name}! I’m your ResolveX assistant. Use the buttons below or type a question. If the status shows “Bot offline,” start Rasa from the rasa_bot folder.`
      );

      function firstBotReply(replies) {
        if (!Array.isArray(replies) || replies.length === 0) return "";
        return String(replies[0] || "").trim();
      }

      async function sendStudentMessage(text) {
        const t = (text || "").trim();
        if (!t) return;
        appendBubble("user", t);
        input.value = "";
        const btn = document.getElementById("rx-chat-send");
        btn.disabled = true;
        try {
          const r = await api("/api/rasa/message", {
            method: "POST",
            body: JSON.stringify({ message: t }),
          });
          const line = firstBotReply(r.replies);
          appendBubble("bot", line || "Please complete the complaint process.");
          await refreshRasaStatus();
        } catch (e) {
          appendBubble(
            "bot",
            e.data?.error || e.message || "Something went wrong. Is Rasa running on port 5005?"
          );
          await refreshRasaStatus();
        } finally {
          btn.disabled = false;
          input.focus();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        sendStudentMessage(input.value);
      });

      document.getElementById("rx-quick").querySelectorAll(".rx-chip").forEach((b) => {
        b.addEventListener("click", () => sendStudentMessage(b.getAttribute("data-msg") || ""));
      });

      await refreshRasaStatus();
      setInterval(refreshRasaStatus, 15000);
      input.focus();
    });
  </script>
</body>

</html>
