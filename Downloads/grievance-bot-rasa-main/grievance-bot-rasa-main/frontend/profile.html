<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function esc(v) {
      const d = document.createElement("div");
      d.textContent = v ?? "";
      return d.innerHTML;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;

      let profile = user;
      let complaints = [];
      try {
        const pr = await api("/api/profile");
        if (pr.ok && pr.profile) profile = pr.profile;
      } catch {}
      try {
        const cr = await api("/api/complaints");
        complaints = cr.complaints || [];
      } catch {}

      const infoRows = [
        ["Name", profile.name || ""],
        ["Student ID", profile.roll_number || ""],
        ["Department", profile.department || "AIML"],
        ["Email", profile.email || ""],
        ["Phone", profile.phone || ""],
      ]
        .map(([k, v]) => `<tr><th class="text-muted">${esc(k)}</th><td>${esc(v || "—")}</td></tr>`)
        .join("");

      const complaintRows = complaints.length
        ? complaints
            .map(
              (c) =>
                `<tr>
                  <td><code>${esc(c.complaint_id || "")}</code></td>
                  <td>${esc(c.title || "General grievance")}</td>
                  <td>${esc(c.category || "other")}</td>
                  <td>${esc(c.status || "pending")}</td>
                </tr>`
            )
            .join("")
        : `<tr><td colspan="4" class="text-muted">No complaints filed yet.</td></tr>`;

      document.getElementById("layout").innerHTML =
        mountStudentSidebar("profile") +
        `<main class="rx-main w-100">
          <h1 class="fw-bold mb-1">Profile</h1>
          <p class="text-muted mb-4">Your account details and submitted complaints.</p>
          <div class="row g-4">
            <div class="col-lg-5">
              <section class="rx-panel-card p-4">
                <h2 class="h5 mb-3">Student Details</h2>
                <table class="table table-sm mb-0"><tbody>${infoRows}</tbody></table>
              </section>
            </div>
            <div class="col-lg-7">
              <section class="rx-panel-card p-4">
                <h2 class="h5 mb-3">Recent Complaints</h2>
                <div class="table-responsive">
                  <table class="table table-sm">
                    <thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Status</th></tr></thead>
                    <tbody>${complaintRows}</tbody>
                  </table>
                </div>
              </section>
            </div>
          </div>
        </main>`;

      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());
      initThemeToggle();
    });
  </script>
</body>
</html>
