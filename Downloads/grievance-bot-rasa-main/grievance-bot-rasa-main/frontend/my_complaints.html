<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Complaints | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;
      document.getElementById("layout").innerHTML =
        mountStudentSidebar("complaints") +
        `<main class="rx-main w-100">
          <h1 class="fw-bold">My Complaints</h1>
          <div class="rx-panel-card p-4 mb-4">
            <label class="form-label">Track by Complaint ID</label>
            <div class="input-group">
              <input class="form-control" id="cid" placeholder="CMP1234" />
              <button class="btn btn-primary" id="btn-track" type="button">Track</button>
            </div>
            <pre class="bg-light p-3 rounded mt-3 d-none" id="out"></pre>
          </div>
          <section class="rx-panel-card p-4">
            <h2 class="h5">All my complaints</h2>
            <div id="list"></div>
          </section>
        </main>`;
      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());

      async function refresh() {
        const r = await api("/api/complaints");
        const rows = r.complaints || [];
        document.getElementById("list").innerHTML = rows.length
          ? `<table class="table"><thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Action</th></tr></thead><tbody>` +
            rows
              .map(
                (c) =>
                  `<tr>
                    <td><code>${c.complaint_id}</code></td>
                    <td>${(c.title || "—").replace(/</g, "&lt;")}</td>
                    <td>${c.category}</td>
                    <td>${c.priority || "—"}</td>
                    <td>${c.status}</td>
                    <td><button class="btn btn-sm btn-outline-danger btn-del" data-id="${c.complaint_id}">Delete</button></td>
                  </tr>`
              )
              .join("") +
            `</tbody></table>`
          : `<p class="text-muted">No complaints yet.</p>`;

        document.querySelectorAll(".btn-del").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const cid = (btn.getAttribute("data-id") || "").trim();
            if (!cid) return;
            if (!confirm(`Delete complaint ${cid}? This cannot be undone.`)) return;
            btn.disabled = true;
            try {
              await api(`/api/complaints/${encodeURIComponent(cid)}`, { method: "DELETE" });
              await refresh();
            } catch (e) {
              alert(e.data?.error || e.message || "Failed to delete complaint.");
              btn.disabled = false;
            }
          });
        });
      }

      document.getElementById("btn-track").onclick = async () => {
        const cid = document.getElementById("cid").value.trim();
        const pre = document.getElementById("out");
        if (!cid) return;
        try {
          const u = new URLSearchParams({ complaint_id: cid });
          const r = await api("/api/complaints?" + u.toString());
          pre.textContent = JSON.stringify(r.complaint, null, 2);
          pre.classList.remove("d-none");
        } catch (e) {
          pre.textContent = e.data?.error || e.message;
          pre.classList.remove("d-none");
        }
      };
      await refresh();
    });
  </script>
</body>
</html>
