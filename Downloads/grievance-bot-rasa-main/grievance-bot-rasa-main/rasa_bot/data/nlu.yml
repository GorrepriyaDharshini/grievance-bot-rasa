# ---------------- DENY ----------------
# Avoid short "not" phrases — those often describe problems (handled as inform during forms).
- intent: deny
  examples: |
    - no
    - nope
    - not really
    - I don't think so
    - cancel
    - no thanks
    - stop
    - don't proceed
    - never mind cancel that
