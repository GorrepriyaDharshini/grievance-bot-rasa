<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discussion | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;
      document.getElementById("layout").innerHTML =
        mountStudentSidebar("discussion") +
        `<main class="rx-main w-100">
          <h1 class="fw-bold">Discussion Forum</h1>
          <section class="rx-panel-card p-4 mb-4">
            <h2 class="h6">Start a topic</h2>
            <textarea class="form-control mb-2" id="topic" rows="3" placeholder="Share your thoughts respectfully..."></textarea>
            <button class="btn btn-primary" id="btn-post" type="button">Post</button>
          </section>
          <div id="threads"></div>
        </main>`;
      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());

      async function load() {
        const r = await api("/api/discussion");
        const host = document.getElementById("threads");
        host.innerHTML = (r.discussions || [])
          .map(
            (d) => `
          <div class="rx-panel-card p-3 mb-3">
            <div class="small text-muted">${d.author_name} · #${d.id}</div>
            <p class="mb-2">${d.content}</p>
            <div class="ms-3 border-start ps-3 mb-2">${(d.comments || [])
              .map((c) => `<div class="small"><strong>${c.author_name || "Student"}:</strong> ${c.comment}</div>`)
              .join("")}</div>
            <div class="input-group input-group-sm">
              <input class="form-control" placeholder="Add a comment" data-c="${d.id}" />
              <button class="btn btn-outline-secondary btn-reply" data-id="${d.id}" type="button">Reply</button>
            </div>
          </div>`
          )
          .join("") || `<p class="text-muted">No threads yet.</p>`;

        host.querySelectorAll(".btn-reply").forEach((b) =>
          b.addEventListener("click", async () => {
            const id = b.getAttribute("data-id");
            const inp = host.querySelector(`input[data-c="${id}"]`);
            const comment = inp.value.trim();
            if (!comment) return;
            await api("/api/discussion", {
              method: "POST",
              body: JSON.stringify({ discussion_id: Number(id), comment }),
            });
            inp.value = "";
            await load();
          })
        );
      }

      document.getElementById("btn-post").onclick = async () => {
        const content = document.getElementById("topic").value.trim();
        if (!content) return;
        await api("/api/discussion", { method: "POST", body: JSON.stringify({ content }) });
        document.getElementById("topic").value = "";
        await load();
      };
      await load();
    });
  </script>
</body>
</html>
