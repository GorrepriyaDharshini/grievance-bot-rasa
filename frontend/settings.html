<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;
      document.getElementById("layout").innerHTML =
        mountStudentSidebar("settings") +
        `<main class="rx-main w-100">
          <h1 class="fw-bold">Settings</h1>
          <section class="rx-panel-card p-4 mt-3" style="max-width:560px">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" data-theme-toggle="1" id="sw" />
              <label class="form-check-label" for="sw">Dark theme</label>
            </div>
            <hr class="my-4" />
            <h2 class="h5 mb-3">Update Password</h2>
            <form id="pw-form" class="row g-3">
              <div class="col-12">
                <label class="form-label">Current password</label>
                <input type="password" class="form-control" id="cur-pw" required />
              </div>
              <div class="col-12">
                <label class="form-label">New password</label>
                <input type="password" class="form-control" id="new-pw" minlength="6" required />
                <div class="form-text">Minimum 6 characters.</div>
              </div>
              <div class="col-12">
                <label class="form-label">Confirm new password</label>
                <input type="password" class="form-control" id="cnf-pw" minlength="6" required />
              </div>
              <div class="col-12">
                <div class="alert alert-danger d-none py-2 mb-0" id="pw-err"></div>
                <div class="alert alert-success d-none py-2 mb-0" id="pw-ok">Password updated successfully.</div>
              </div>
              <div class="col-12">
                <button class="btn btn-primary" type="submit">Update password</button>
              </div>
            </form>
            <button class="btn btn-danger mt-4" id="lg" type="button">Logout</button>
          </section>
        </main>`;
      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());
      document.getElementById("lg").onclick = () => logoutStudent();
      document.getElementById("pw-form").onsubmit = async (e) => {
        e.preventDefault();
        const err = document.getElementById("pw-err");
        const ok = document.getElementById("pw-ok");
        err.classList.add("d-none");
        ok.classList.add("d-none");
        const current_password = document.getElementById("cur-pw").value;
        const new_password = document.getElementById("new-pw").value;
        const confirm_password = document.getElementById("cnf-pw").value;
        if (new_password !== confirm_password) {
          err.textContent = "New password and confirm password must match.";
          err.classList.remove("d-none");
          return;
        }
        try {
          await api("/api/profile", {
            method: "POST",
            body: JSON.stringify({ current_password, new_password }),
          });
          document.getElementById("pw-form").reset();
          ok.classList.remove("d-none");
        } catch (x) {
          err.textContent = x.data?.error || x.message || "Password update failed.";
          err.classList.remove("d-none");
        }
      };
      initThemeToggle();
    });
  </script>
</body>
</html>
