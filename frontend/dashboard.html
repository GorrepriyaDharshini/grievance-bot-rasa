<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard | ResolveX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="rx-layout" id="layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = await requireStudent();
      if (!user) return;
      document.getElementById("layout").innerHTML =
        mountStudentSidebar("dash") +
        `<main class="rx-main w-100">
          <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
            <div>
              <h1 class="fw-bold">Student Dashboard</h1>
              <p class="text-muted mb-0">Track and manage your complaints.</p>
            </div>
            <a href="/raise_grievance.html" class="btn btn-primary btn-lg">+ Raise Complaint</a>
          </div>
          <div class="row g-3 mb-4" id="stats-row"></div>
          <section class="rx-panel-card p-4">
            <h2 class="h5 mb-3">Recent Complaints</h2>
            <div id="list"></div>
          </section>
        </main>`;
      document.getElementById("rx-signout")?.addEventListener("click", () => logoutStudent());

      const complaints = (await api("/api/complaints")).complaints || [];
      const total = complaints.length;
      const pending = complaints.filter((c) => c.status === "pending").length;
      const resolved = complaints.filter((c) => c.status === "resolved").length;
      const high = complaints.filter(
        (c) => (c.priority || "").toLowerCase() === "high"
      ).length;

      document.getElementById("stats-row").innerHTML = `
        <div class="col-md-3"><div class="card rx-card-stat stat-total p-3"><div class="small">Total</div><div class="fs-2 fw-bold">${total}</div></div></div>
        <div class="col-md-3"><div class="card rx-card-stat stat-pending p-3"><div class="small">Pending</div><div class="fs-2 fw-bold">${pending}</div></div></div>
        <div class="col-md-3"><div class="card rx-card-stat stat-resolved p-3"><div class="small">Resolved</div><div class="fs-2 fw-bold">${resolved}</div></div></div>
        <div class="col-md-3"><div class="card rx-card-stat stat-high p-3"><div class="small">High priority*</div><div class="fs-2 fw-bold">${high}</div></div></div>
        <p class="small text-muted">*Complaints marked high priority.</p>`;

      const list = document.getElementById("list");
      if (!complaints.length) {
        list.innerHTML = `<div class="text-center py-5 text-muted fade-soft">No complaints yet<div class="fs-1">📄</div></div>`;
      } else {
        list.innerHTML =
          `<table class="table table-sm"><thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Status</th><th></th></tr></thead><tbody>` +
          complaints
            .slice(0, 8)
            .map(
              (c) =>
                `<tr><td><code>${c.complaint_id}</code></td><td>${(c.title || "—").replace(/</g, "&lt;")}</td><td>${c.category}</td><td><span class="badge bg-secondary">${c.status}</span></td>
                <td>${c.status === "resolved" ? `<button class="btn btn-sm btn-outline-primary" data-fb="${c.complaint_id}">Feedback</button>` : ""}</td></tr>`
            )
            .join("") +
          `</tbody></table>`;
      }

      list.querySelectorAll("button[data-fb]").forEach((b) =>
        b.addEventListener("click", async () => {
          const cid = b.getAttribute("data-fb");
          const rating = prompt("Rating 1-5?", "5");
          const feedback = prompt("Comments?", "Resolved well.");
          if (!rating) return;
          await api("/api/feedback", {
            method: "POST",
            body: JSON.stringify({ complaint_id: cid, rating: Number(rating), feedback }),
          });
          alert("Thanks for your feedback!");
        })
      );
    });
  </script>
</body>
</html>
